<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>API Test Page</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 40px;
      background: #f5f5f5;
    }
    button {
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
    }
    #output {
      margin-top: 20px;
      padding: 15px;
      background: #fff;
      border: 1px solid #ccc;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>

  <h2>API Test (CORS Check)</h2>

  <button onclick="callAPI()">Fetch API</button>

  <div id="output">Click the button to call API...</div>

  <script>
    async function callAPI() {
      const output = document.getElementById("output");
      output.innerText = "Calling API...";

      try {
        const response = await fetch("https://o0yidywk9e.execute-api.us-east-1.amazonaws.com/dev/products");

        // This will fail if CORS is not enabled
        const data = await response.json();

        output.innerText = "✅ Success:\n\n" + JSON.stringify(data, null, 2);

      } catch (error) {
        output.innerText = "❌ Error:\n\n" + error;
        console.error(error);
      }
    }
  </script>

</body>
</html>
